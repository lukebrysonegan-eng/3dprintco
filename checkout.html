<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout – 3D Print Co.</title>
  <link rel="stylesheet" href="style.css" />
  <script src="tracker.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init('GuxsdtlVMkOSslqLP');</script>
</head>
<body>

  <header>
    <h1>3D Print Co.</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="index.html#contact">Contact</a>
    <a href="cart.html" class="cart-nav-btn">🛒 Cart (<span class="cart-count">0</span>)</a>
    </nav>
  </header>

  <section id="checkout-page">
    <a class="back-link" id="back-btn" href="products.html">← Back</a>

    <div class="checkout-wrapper">

      <!-- Order Summary -->
      <div class="order-summary">
        <h3>Order Summary</h3>
        <div id="order-item">
          <p id="order-name" style="font-size:1.2rem; font-weight:bold; color:white;"></p>
          <p id="order-price" style="color:#e94560; font-size:1.1rem; margin-top:0.25rem;"></p>
        </div>
        <hr style="margin:1rem 0; border:none; border-top:1px solid #eee;" />
        <p style="font-size:0.85rem; color:#999;">We'll confirm your order and contact you within 24 hours.</p>
      </div>

      <!-- Customer Info Form -->
      <div class="checkout-form-box">
        <h2>Your Information</h2>
        <form id="checkout-form" onsubmit="submitOrder(event)">

          <div class="form-row">
            <div>
              <label for="first-name">First Name</label>
              <input type="text" id="first-name" placeholder="Jane" required />
            </div>
            <div>
              <label for="last-name">Last Name</label>
              <input type="text" id="last-name" placeholder="Smith" required />
            </div>
          </div>

          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="jane@example.com" required />

          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="+1 (555) 000-0000" />

          <label for="address">Shipping Address</label>
          <input type="text" id="address" placeholder="123 Main St" required />

          <div class="form-row">
            <div>
              <label for="city">City</label>
              <input type="text" id="city" placeholder="New York" required />
            </div>
            <div>
              <label for="zip">ZIP / Postal Code</label>
              <input type="text" id="zip" placeholder="10001" required />
            </div>
          </div>

          <label for="notes">Order Notes <span style="font-weight:400; color:#999; font-size:0.85rem;">(optional)</span></label>
          <textarea id="notes" rows="3" placeholder="Any special requests or details about your order..."></textarea>

          <button type="submit" class="btn" style="margin-top:0.5rem;">Place Order</button>
        </form>
      </div>

    </div>
  </section>

  <!-- Success Message -->
  <div id="success-overlay" style="display:none;">
    <div class="modal-box" style="text-align:center; max-width:400px;">
      <div style="font-size:3rem;">✅</div>
      <h3 style="margin-top:0.5rem;">Order Received!</h3>
      <p style="color:#555; margin-top:0.5rem;">Thanks! We'll reach out to you within 24 hours to confirm your order.</p>
      <a href="products.html" class="btn" style="display:inline-block; margin-top:1.5rem;">Back to Products</a>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 3D Print Co. All rights reserved.</p>
  </footer>

  <script>
    window.onload = function () {
      const params  = new URLSearchParams(window.location.search);
      const cart    = JSON.parse(localStorage.getItem('cart') || '[]');
      const orderEl = document.getElementById('order-item');
      const backBtn = document.getElementById('back-btn');

      if (cart.length > 0) {
        // ---- Cart checkout ----
        backBtn.href = 'cart.html';
        let grandTotal = 0;
        let html = '';

        cart.forEach(item => {
          const lineTotal = item.unitPrice ? item.unitPrice * item.qty : 0;
          grandTotal += lineTotal;
          html += `
            <div style="display:flex; justify-content:space-between; align-items:flex-start;
                        margin-bottom:0.75rem; padding-bottom:0.75rem;
                        border-bottom:1px solid rgba(255,255,255,0.15);">
              <div>
                <p style="font-weight:bold; color:white; margin:0; font-size:1rem;">
                  ${item.emoji || '📦'} ${item.name}
                </p>
                <p style="color:#aac4e8; font-size:0.85rem; margin:0.25rem 0 0;">
                  ${item.color ? '🎨 ' + item.color + '  ·  ' : ''}Qty: ${item.qty}
                </p>
              </div>
              <span style="color:#e94560; font-weight:bold; margin-left:1rem;">
                ${lineTotal > 0 ? '$' + lineTotal.toFixed(2) : '—'}
              </span>
            </div>`;
        });

        if (grandTotal > 0) {
          html += `
            <div style="display:flex; justify-content:space-between; margin-top:0.75rem;
                        font-weight:bold; color:white; font-size:1.1rem; border-top:1px solid rgba(255,255,255,0.3); padding-top:0.75rem;">
              <span>Total</span>
              <span style="color:#e94560;">$${grandTotal.toFixed(2)}</span>
            </div>`;
        }

        orderEl.innerHTML = html;

      } else {
        // ---- Single product checkout (URL params) ----
        const name  = decodeURIComponent(params.get('name')  || '');
        const price = decodeURIComponent(params.get('price') || '');
        const color = decodeURIComponent(params.get('color') || '');
        const qty   = parseInt(params.get('qty') || '1');

        if (!name) {
          orderEl.innerHTML = '<p style="color:#aac4e8;">No items found. <a href="products.html" style="color:#e94560;">Go back to products.</a></p>';
          return;
        }

        orderEl.innerHTML = `
          <p style="font-weight:bold; color:white; font-size:1.1rem; margin:0;">${name}</p>
          ${color ? `<p style="color:#aac4e8; margin:0.3rem 0 0;">🎨 ${color}</p>` : ''}
          ${qty > 1 ? `<p style="color:#aac4e8; margin:0.3rem 0 0;">📦 Qty: ${qty}</p>` : ''}
          ${price ? `<p style="color:#e94560; font-weight:bold; font-size:1.1rem; margin:0.5rem 0 0;">${price}</p>` : ''}
        `;

        const slug = encodeURIComponent(params.get('name') || '');
        backBtn.href = `product-detail.html?name=${slug}`;
      }
    };

    function submitOrder(e) {
      e.preventDefault();
      const params    = new URLSearchParams(window.location.search);
      const fromCart  = params.get('from') === 'cart';
      const customer  = document.getElementById('first-name').value + ' ' + document.getElementById('last-name').value;
      const email     = document.getElementById('email').value;
      const date      = new Date().toLocaleDateString();
      const orders    = JSON.parse(localStorage.getItem('orders') || '[]');

      if (fromCart) {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let grandTotal = 0;

        cart.forEach(item => {
          // Deduct stock per item
          const key = 'stock__' + item.name + '__' + item.color;
          const cur = localStorage.getItem(key);
          if (cur !== null) localStorage.setItem(key, Math.max(0, parseInt(cur) - item.qty));
          const lineTotal = item.unitPrice ? (item.unitPrice * item.qty) : 0;
          grandTotal += lineTotal;
          orders.unshift({ product: item.name, color: item.color, qty: item.qty, price: item.unitPrice ? '$' + lineTotal.toFixed(2) : '—', name: customer, email, date });
        });

        localStorage.setItem('orders', JSON.stringify(orders));
        localStorage.removeItem('cart'); // clear cart after order
      } else {
        const product = decodeURIComponent(params.get('name')  || 'Unknown');
        const color   = decodeURIComponent(params.get('color') || '');
        const qty     = parseInt(params.get('qty') || '1');

        if (color) {
          const key = 'stock__' + product + '__' + color;
          const cur = localStorage.getItem(key);
          if (cur !== null) localStorage.setItem(key, Math.max(0, parseInt(cur) - qty));
        }

        orders.unshift({ product, price: decodeURIComponent(params.get('price') || ''), color, qty, name: customer, email, date });
        localStorage.setItem('orders', JSON.stringify(orders));
      }

      // Send email notification
      const customer = document.getElementById('first-name').value + ' ' + document.getElementById('last-name').value;
      const email    = document.getElementById('email').value;
      const fromCart = new URLSearchParams(window.location.search).get('from') === 'cart';
      let summary = '';

      if (fromCart) {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        summary = cart.map(i => `• ${i.emoji || ''} ${i.name} | Color: ${i.color || '—'} | Qty: ${i.qty} | $${i.unitPrice ? (i.unitPrice * i.qty).toFixed(2) : '—'}`).join('\n');
      } else {
        const p = new URLSearchParams(window.location.search);
        summary = `• ${decodeURIComponent(p.get('name') || '')} | Color: ${decodeURIComponent(p.get('color') || '—')} | Qty: ${p.get('qty') || 1} | ${decodeURIComponent(p.get('price') || '—')}`;
      }

      emailjs.send('service_me0vzep', 'template_hdm2b18', {
        subject:    '🛒 New Order from ' + customer,
        from_name:  customer,
        from_email: email,
        message:    'New order received!\n\n' + summary + '\n\nCustomer Email: ' + email + '\nDate: ' + new Date().toLocaleString()
      });

      document.getElementById('success-overlay').style.display = 'flex';
    }
  </script>

</body>
</html>
